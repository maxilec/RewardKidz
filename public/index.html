<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#4a90e2" />
  <link rel="manifest" href="./manifest.json" />
  <title>RewardKidz</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <!-- LANDING SCREEN — role selection -->
  <div id="login-screen">
    <div class="login-header">
      <h1>RewardKidz</h1>
      <p class="login-tagline">La famille qui avance ensemble</p>
    </div>

    <div class="role-choices">
      <button class="role-card" id="goParent">
        <span class="role-icon">👨‍👩‍👧</span>
        <span class="role-label">Je suis un parent</span>
        <span class="role-hint">S'identifier ou rejoindre une famille</span>
      </button>

      <button class="role-card" id="goChild">
        <span class="role-icon">🧒</span>
        <span class="role-label">Je suis un enfant</span>
        <span class="role-hint">Connecter cet appareil avec mon code</span>
      </button>
    </div>
  </div>

  <!-- APP CONTAINER (SPA) -->
  <div id="app" style="display:none;"></div>

  <!-- Auth state: show/hide landing vs app -->
  <script type="module">
    import { auth } from "./firebase.js";
    auth.onAuthStateChanged((user) => {
      const landing = document.getElementById("login-screen");
      const app     = document.getElementById("app");
      if (user) {
        landing.style.display = "none";
        app.style.display = "block";
      } else {
        landing.style.display = "flex";
        app.style.display = "none";
      }
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="./main.js?v=3"></script>
</body>
</html>
