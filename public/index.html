<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4a90e2" />
  <link rel="manifest" href="./manifest.json" />
  <title>RewardKidz - POC</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div id="login-screen">
    <h1>RewardKidz</h1>

    <button id="login" class="primary-btn">
      Connexion Google (Parent)
    </button>

    <button id="loginChild" class="secondary-btn">
      Je suis un enfant (nouveau)
    </button>

    <button id="loginChildReconnect" class="secondary-btn">
      J’ai déjà un code enfant
    </button>

    <div id="childReconnectPanel" style="display:none; margin-top:1rem;">
      <input id="childReconnectCode" placeholder="Code enfant" maxlength="6">
      <button id="childReconnectBtn">Se reconnecter</button>
    </div>
  </div>

  <div id="app" style="display:none;"></div>

  <script type="module">
    import { auth } from "./firebase.js";

    auth.onAuthStateChanged((user) => {
      const loginScreen = document.getElementById("login-screen");
      const app = document.getElementById("app");

      if (user) {
        loginScreen.style.display = "none";
        app.style.display = "block";
      } else {
        loginScreen.style.display = "block";
        app.style.display = "none";
      }
    });
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
