<div class="page parent">

  <h1>Espace Parent</h1>

  <p class="subtitle">
    Bienvenue dans votre tableau de bord parent.
  </p>

  <div class="card-list">

    <div class="card">
      <h2>👨‍👩‍👧‍👦 Famille</h2>
      <p>Gérer les membres de la famille.</p>
      <button class="secondary-btn" id="btnFamily">Voir la famille</button>
    </div>

    <div class="card">
      <h2>⭐ Missions</h2>
      <p>Créer et gérer les missions quotidiennes.</p>
      <button class="secondary-btn" id="btnMissions">Gérer les missions</button>
    </div>

    <div class="card">
      <h2>🛒 Boutique</h2>
      <p>Configurer les récompenses disponibles.</p>
      <button class="secondary-btn" id="btnShop">Gérer la boutique</button>
    </div>

    <div class="card">
        <h2>🔑 Code famille</h2>
        <p id="familyCodeDisplay">Chargement...</p>
        <button class="secondary-btn" id="copyFamilyCode">Copier le code</button>
    </div>
  </div>

  <button class="danger-btn" id="logoutBtn">
    Se déconnecter
  </button>

</div>
