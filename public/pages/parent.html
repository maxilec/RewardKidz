<div class="page parent">

  <!-- ── Drawer partagé (injecté par initSharedDrawer) ────────── -->
  <div id="drawer-root"></div>

  <!-- ── Overlay (modale invitation) ─────────────────────────── -->
  <div class="app-modal-overlay" id="invite-modal-ov" onclick="rkCloseModal('invite-modal')"></div>

  <!-- ── Modale invitation adulte ─────────────────────────────── -->
  <div class="app-modal" id="invite-modal">
    <button class="app-modal-close" onclick="rkCloseModal('invite-modal')" aria-label="Fermer">✕</button>
    <div class="app-modal-title">🔗 Inviter un adulte</div>
    <p class="app-hint">Code temporaire valable 15 min — à transmettre à l'adulte qui rejoint via « Rejoindre ».</p>
    <p id="inviteCode" class="app-invite-code">—</p>
    <div id="inviteQRCode" style="display:none; margin: 4px auto; width: fit-content;"></div>
    <button id="generateInvite" class="app-btn-prim full">Générer / Rafraîchir</button>
    <div class="app-modal-divider"></div>
    <div style="text-align:center; padding: 4px 0 2px">
      <div class="app-drawer-code-label" style="margin-bottom:6px">Code famille permanent (rappel)</div>
      <div class="app-drawer-code-val" id="permanentFamilyCodeModal" style="font-size:18px;letter-spacing:3px">—</div>
    </div>
  </div>

  <!-- ── En-tête gradient ─────────────────────────────────────── -->
  <div class="app-header">
    <button class="app-burger app-burger--header" onclick="rkOpenDrawer('par-drawer','par-ov')" aria-label="Menu">☰</button>
    <div class="app-header-info">
      <div class="app-header-title" id="familyName">Chargement…</div>
      <div class="app-header-sub">Tableau de bord parent</div>
    </div>
    <span class="app-header-emoji">👨‍👩‍👧</span>
  </div>

  <!-- ── Corps scrollable ─────────────────────────────────────── -->
  <div class="app-body">

    <!-- Membres de la famille (enfants) -->
    <div class="app-section-hd">
      <span class="app-section-title">Membres de la famille</span>
    </div>
    <div id="childrenList"><p class="app-hint">Aucun enfant pour l'instant.</p></div>

    <!-- Parents et tuteurs -->
    <div class="app-section-hd" style="margin-top:24px">
      <span class="app-section-title">👤 Parents et tuteurs</span>
    </div>
    <div id="parentsList"><p class="app-hint">Chargement…</p></div>
    <button class="app-btn-outline full" style="margin-top:10px"
            onclick="rkOpenModal('invite-modal')" id="openInviteModalBtn">
      + Inviter un membre adulte
    </button>

  </div><!-- /.app-body -->

</div><!-- /.page.parent -->
