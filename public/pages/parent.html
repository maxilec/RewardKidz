<div class="page parent">
  <h1>Espace parent</h1>

  <div class="card">
    <h2>🔑 Code d’invitation (nouvel enfant)</h2>
    <p id="inviteCode" class="invite-code">Aucun code généré</p>
    <button id="generateInvite" class="secondary-btn">
      Générer un code
    </button>
  </div>

  <div class="card">
    <h2>🔁 Code de reconnexion enfant</h2>
    <p class="hint">
      POC : tu dois saisir l’UID de l’enfant (visible dans Firestore).
    </p>
    <button id="generateReconnect" class="secondary-btn">
      Générer un code de connexion temporaire
    </button>
  </div>

  <div class="card danger-zone">
    <h2>⚠️ Supprimer la famille</h2>
    <p>Cette action est irréversible.</p>
    <button id="deleteFamilyBtn" class="danger-btn">
      Supprimer la famille
    </button>
  </div>


  <button id="logoutBtn" class="danger-btn">
    Se déconnecter
  </button>
</div>
