<div class="page join-family">
  <h1>Rejoindre une famille</h1>

  <p class="subtitle">
    Entre le code d’invitation et ton prénom.
  </p>

  <div class="form-group">
    <label for="familyCode">Code d’invitation</label>
    <input id="familyCode" type="text" maxlength="6" placeholder="Ex : AB4F9Z">
  </div>

  <div class="form-group">
    <label for="childName">Ton prénom</label>
    <input id="childName" type="text" placeholder="Ex : Léo">
  </div>

  <button id="joinFamilyBtn" class="primary-btn">
    Rejoindre la famille
  </button>
</div>
