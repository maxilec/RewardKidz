<div class="page child-detail-page">

  <!-- ── Overlay (modale OTP) ─────────────────────────────────── -->
  <div class="app-modal-overlay" id="otp-modal-ov" onclick="rkCloseModal('otp-modal')"></div>

  <!-- ── Modale code connexion enfant ─────────────────────────── -->
  <div class="app-modal" id="otp-modal">
    <button class="app-modal-close" onclick="rkCloseModal('otp-modal')" aria-label="Fermer">✕</button>
    <div class="app-modal-title">🔑 Code connexion</div>
    <p class="app-hint">À saisir sur l'appareil de l'enfant lors de la première connexion.</p>
    <div id="detail-otp-display">
      <p class="app-hint">Appuie sur « Générer » pour créer un code.</p>
    </div>
    <button id="detail-otp-generate-btn" class="app-btn-prim full">Générer un code</button>
  </div>

  <!-- ── En-tête gradient (cohérent avec parent dashboard) ────── -->
  <div class="app-header">
    <button id="backToParent" class="app-burger app-burger--header" aria-label="Retour">←</button>
    <div class="app-header-info">
      <div class="app-header-title" id="detailChildName">—</div>
      <div class="app-header-sub" id="detailChildStatus">En attente</div>
    </div>
    <span class="app-header-emoji">🧒</span>
  </div>

  <!-- ── Corps scrollable ─────────────────────────────────────── -->
  <div class="app-body">

    <!-- Score du jour -->
    <div class="app-section-hd">
      <span class="app-section-title">Score du jour</span>
    </div>
    <div class="child-score-card">
      <div class="score-section" id="detail-score-section">
        <p class="app-hint">Chargement…</p>
      </div>
    </div>

    <!-- Gestion -->
    <div class="app-section-hd" style="margin-top:24px">
      <span class="app-section-title">Gestion</span>
    </div>
    <div class="child-score-card" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="app-btn-outline" style="flex:1" id="detail-otp-btn">🔑 Code connexion</button>
      <button class="app-btn-outline" style="flex:1" id="detail-rename-btn">✏️ Renommer</button>
      <button class="app-btn-outline danger-outline" style="flex:1" id="detail-delete-btn">🗑 Supprimer</button>
    </div>

    <!-- Statistiques -->
    <div class="app-section-hd" style="margin-top:24px">
      <span class="app-section-title">Statistiques</span>
    </div>
    <div class="child-score-card">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Moyenne 7 jours validés</div>
          <span class="stat-value" id="stat-avg7">—</span>
        </div>
        <div class="stat-box">
          <div class="stat-label">Tendance 30 jours</div>
          <span class="stat-value" id="stat-trend30">—</span>
        </div>
      </div>
    </div>

    <!-- Historique -->
    <div class="app-section-hd" style="margin-top:24px">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <span class="app-section-title" style="flex:1">Historique</span>
        <div class="app-hist-toggle">
          <button class="toggle-btn active" id="toggle-7d">7 jours</button>
          <button class="toggle-btn"        id="toggle-30d">30 jours</button>
        </div>
      </div>
    </div>
    <div class="child-score-card">
      <div id="histogram-container"><p class="app-hint">Chargement…</p></div>
    </div>

  </div><!-- /.app-body -->

</div><!-- /.page.child-detail-page -->
