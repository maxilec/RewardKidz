<div class="page child-detail-page">

  <!-- ── Overlay (modale OTP) ─────────────────────────────────── -->
  <div class="app-modal-overlay" id="otp-modal-ov" onclick="rkCloseModal('otp-modal')"></div>

  <!-- ── Modale code connexion enfant ─────────────────────────── -->
  <div class="app-modal" id="otp-modal">
    <button class="app-modal-close" onclick="rkCloseModal('otp-modal')" aria-label="Fermer">✕</button>
    <div class="app-modal-title">🔑 Code connexion</div>
    <p class="app-hint">À saisir sur l'appareil de l'enfant lors de la première connexion.</p>
    <div id="detail-otp-display">
      <p class="app-hint">Appuie sur « Générer » pour créer un code.</p>
    </div>
    <button id="detail-otp-generate-btn" class="app-btn-prim full">Générer un code</button>
  </div>

  <!-- ── En-tête avec retour ──────────────────────────────────── -->
  <div class="detail-header">
    <a id="backToParent" class="back-link" role="button" aria-label="Retour">←</a>
    <h1 id="detailChildName">—</h1>
    <span id="detailChildStatus" class="child-status pending">En attente</span>
  </div>

  <!-- ── Corps scrollable ─────────────────────────────────────── -->
  <div class="s-detail-body">

    <!-- Score du jour -->
    <div class="card">
      <h2>⭐ Score du jour</h2>
      <div class="score-section" id="detail-score-section">
        <p class="hint">Chargement…</p>
      </div>
    </div>

    <!-- Gestion : code connexion + renommer + supprimer -->
    <div class="card">
      <h2>⚙️ Gestion</h2>
      <div class="child-otp-section">
        <button class="secondary-btn" id="detail-otp-btn">🔑 Code connexion</button>
      </div>
      <div class="detail-actions-row" style="margin-top:10px">
        <button class="icon-btn" id="detail-rename-btn">✏️ Renommer</button>
        <button class="icon-btn danger" id="detail-delete-btn">🗑 Supprimer</button>
      </div>
    </div>

    <!-- Statistiques -->
    <div class="card">
      <h2>📊 Statistiques</h2>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Moyenne 7 jours validés</div>
          <span class="stat-value" id="stat-avg7">—</span>
        </div>
        <div class="stat-box">
          <div class="stat-label">Tendance 30 jours</div>
          <span class="stat-value" id="stat-trend30">—</span>
        </div>
      </div>
    </div>

    <!-- Historique -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2 style="margin:0">📅 Historique</h2>
        <div class="app-hist-toggle">
          <button class="toggle-btn active" id="toggle-7d">7 jours</button>
          <button class="toggle-btn"        id="toggle-30d">30 jours</button>
        </div>
      </div>
      <div id="histogram-container"><p class="hint">Chargement…</p></div>
    </div>

  </div><!-- /.s-detail-body -->

</div><!-- /.page.child-detail-page -->
