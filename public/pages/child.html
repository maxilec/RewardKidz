<div class="page child">

  <!-- ── Overlay ─────────────────────────────────────────────── -->
  <div class="app-overlay" id="chi-ov" onclick="rkCloseDrawer('chi-drawer','chi-ov')"></div>

  <!-- ── Overlay (modale widget) ───────────────────────────────── -->
  <div class="app-modal-overlay" id="widget-modal-ov" onclick="rkCloseModal('widget-modal')"></div>

  <!-- ── Modale widget Scriptable (lecture seule) ──────────────── -->
  <div class="app-modal" id="widget-modal">
    <button class="app-modal-close" onclick="rkCloseModal('widget-modal')" aria-label="Fermer">✕</button>
    <div class="app-modal-title">📊 Widget Scriptable</div>
    <p class="app-hint">URL de votre widget. Un parent peut la créer depuis la page de détail.</p>
    <p id="child-widget-url" class="app-invite-code" style="font-size:11px;word-break:break-all;line-height:1.4">—</p>
    <button id="child-widget-copy-btn" class="app-btn-prim full">📋 Copier l'URL</button>
  </div>

  <!-- ── Drawer droit ─────────────────────────────────────────── -->
  <div class="app-drawer" id="chi-drawer">
    <div class="app-drawer-head">
      <span class="app-drawer-emoji">🧒</span>
      <div class="app-drawer-title" id="childDrawerName">Mon espace</div>
      <div class="app-drawer-sub">Espace enfant</div>
    </div>
    <div class="app-drawer-body">
      <div class="app-drawer-sep"></div>
    </div>
    <!-- ID conservé pour main.js (bindLogoutButton) -->
    <div class="app-drawer-danger-zone">
      <div class="app-drawer-item danger" id="logoutBtn">
        <span class="app-drawer-item-icon">🚪</span>Se déconnecter
      </div>
    </div>
    <div class="app-drawer-foot">
      <div class="warn-box" style="margin-bottom:10px;font-size:12px;background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:12px;padding:10px 14px;color:#92400E;line-height:1.5">
        ⚠️ Si tu te déconnectes, tu auras besoin du code famille et de ton code secret pour revenir.
      </div>
      <div class="app-drawer-code">
        <div>
          <div class="app-drawer-code-label">Code famille</div>
          <div class="app-drawer-code-val" id="childFamilyCodeDisplay">—</div>
        </div>
      </div>
      <div class="app-drawer-version">RewardKidz v2.0</div>
    </div>
  </div>

  <!-- ── En-tête gradient ─────────────────────────────────────── -->
  <div class="app-header">
    <button class="app-burger app-burger--header" onclick="rkOpenDrawer('chi-drawer','chi-ov')" aria-label="Menu">☰</button>
    <div class="app-header-info">
      <div class="app-header-title">RewardKidz</div>
      <div id="childWelcome" class="app-header-sub">Bonjour !</div>
    </div>
    <span class="app-header-emoji">🧒</span>
  </div>

  <!-- ── Carte score ───────────────────────────────────────────── -->
  <div class="app-body" style="padding-top:0">
    <div class="app-score-card">
      <div id="childScoreDisplay" class="child-score-loading">Chargement…</div>
    </div>
    <div style="padding: 8px 0 8px">
      <button class="app-btn-outline full" id="child-widget-btn">📊 Widget Scriptable</button>
    </div>
  </div>


</div><!-- /.page.child -->
