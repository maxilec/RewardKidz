<div class="page parent-auth">

  <a id="backToLanding" class="back-link">← Retour</a>

  <div class="auth-card">

    <div class="auth-tabs" role="tablist">
      <button id="tabSignin" class="auth-tab active" role="tab" aria-selected="true" aria-controls="panel-signin">
        S'identifier
      </button>
      <button id="tabJoinFamily" class="auth-tab" role="tab" aria-selected="false" aria-controls="panel-join">
        Rejoindre
      </button>
    </div>

    <!-- S'identifier -->
    <div id="panel-signin" class="auth-panel" role="tabpanel">
      <p class="panel-hint">Tu as déjà un compte</p>

      <button id="loginGoogle" class="google-btn">
        <span class="google-icon">G</span> Continuer avec Google
      </button>

      <div class="separator"><span>ou</span></div>

      <form id="formSignin" novalidate>
        <input id="signinEmail" type="email" placeholder="Email" required autocomplete="email">
        <input id="signinPassword" type="password" placeholder="Mot de passe" required autocomplete="current-password">
        <button type="submit" class="primary-btn">Se connecter</button>
      </form>
    </div>

    <!-- Rejoindre une famille -->
    <div id="panel-join" class="auth-panel hidden" role="tabpanel">
      <p class="panel-hint">Un parent t'a transmis un code d'invitation</p>

      <div class="form-group">
        <input id="joinInviteCode" type="text" maxlength="6" placeholder="Code d'invitation (6 cars)"
               autocomplete="off" style="text-transform:uppercase;letter-spacing:3px;font-weight:700">
      </div>

      <button id="joinGoogle" class="google-btn">
        <span class="google-icon">G</span> Continuer avec Google
      </button>

      <div class="separator"><span>ou</span></div>

      <form id="formJoin" novalidate>
        <input id="joinDisplayName" type="text" placeholder="Ton prénom" required autocomplete="given-name">
        <input id="joinEmail" type="email" placeholder="Email" required autocomplete="email">
        <input id="joinPassword" type="password" placeholder="Mot de passe (6 cars min)" required autocomplete="new-password">
        <button type="submit" class="primary-btn">Créer un compte et rejoindre</button>
      </form>
    </div>

  </div>
</div>
