<div class="page create-family">
  <h1>Créer une famille</h1>

  <div class="form-group">
    <label for="familyName">Nom de la famille</label>
    <input id="familyName" type="text" placeholder="Ex : Famille Dupont">
  </div>

  <div class="form-group">
    <label for="parentName">Votre prénom</label>
    <input id="parentName" type="text" placeholder="Ex : Papa, Maman, Maxime">
  </div>

  <button id="createFamilyBtn" class="primary-btn">
    Créer la famille
  </button>
</div>
