<div class="page create-family">

  <h1>Créer une famille</h1>

  <p class="subtitle">
    Donne un nom à ta famille pour commencer.
  </p>

  <div class="form-group">
    <label for="familyName">Nom de la famille</label>
    <input id="familyName" type="text" placeholder="Ex : Les SuperKids">
  </div>

  <div class="form-group">
    <label for="parentNickname">Comment souhaitez-vous être appelé ?</label>
    <input id="parentNickname" type="text" placeholder="Ex : Papa, Maman, Marc…" autocomplete="given-name">
  </div>

  <button id="createFamilyBtn" class="primary-btn">
    Créer la famille
  </button>

  <p class="alt-link">
    Tu as déjà un code famille ?
    <a href="#join-family">Rejoindre une famille</a>
  </p>

</div>
