<div class="page child-auth">

  <a id="backToLanding" class="back-link">← Retour</a>

  <h1>🧒 Connexion enfant</h1>
  <p class="subtitle">Entre les deux codes que ton parent t'a donnés.</p>

  <div class="card">
    <div class="form-group">
      <label for="childFamilyCode">Code famille (8 caractères)</label>
      <input id="childFamilyCode" type="text" maxlength="8" placeholder="Ex : ABCD1234"
             autocomplete="off" style="text-transform:uppercase;letter-spacing:3px;font-weight:700">
    </div>

    <div class="form-group">
      <label for="childOtpInput">Code enfant (6 chiffres)</label>
      <input id="childOtpInput" type="tel" inputmode="numeric" maxlength="6"
             placeholder="••••••" autocomplete="one-time-code" class="otp-input">
    </div>

    <button id="connectChildBtn" class="primary-btn">Me connecter</button>
  </div>

</div>
