<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />

    <!--
      viewport-fit=cover : étend le rendu sous l'encoche et le home indicator.
      maximum-scale=1.0 + user-scalable=no : désactive le zoom utilisateur.
      Ces deux attributs sont prérequis pour env(safe-area-inset-*).
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
               maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA — comportement natif iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RewardKidz" />

    <!-- Android : couleur barre de statut Chrome -->
    <meta name="theme-color" content="#7C3AED" />

    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!--
      Anti-zoom JS — bloque le pinch-to-zoom résiduel non intercepté par CSS.
      passive:false requis pour pouvoir appeler preventDefault().
    -->
    <script>
      document.addEventListener(
        'touchstart',
        function (e) {
          if (e.touches.length > 1) e.preventDefault();
        },
        { passive: false }
      );

      /** Tap léger — boutons secondaires, navigation */
      function hapticLight() {
        if (navigator.vibrate) navigator.vibrate(10);
      }
      /** Succès — validation journée, ajout enfant, etc. */
      function hapticSuccess() {
        if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
      }
      /** Erreur — action bloquée, confirmation destructive */
      function hapticError() {
        if (navigator.vibrate) navigator.vibrate([80, 30, 80]);
      }

      // Expose globalement pour les composants Svelte qui en ont besoin
      window.hapticLight = hapticLight;
      window.hapticSuccess = hapticSuccess;
      window.hapticError = hapticError;
    </script>

    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
