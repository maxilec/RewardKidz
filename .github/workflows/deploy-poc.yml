name: Deploy RewardKidz POC to Firebase Hosting

on:
  push:
    branches:
      - 'fix/2.0/POC'
      - 'claude/secure-dev-branch-Apa2M'
      - 'dev/main'
      - 'figma/NewUI'
      - 'claude/review-figma-ui-changes-kUMwo'
      - 'refactoring/app'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout du dépôt
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Génération du fichier firebase.config.js dans /public
      - name: Générer firebase.config.js depuis les secrets
        run: |
          mkdir -p public
          cat <<EOF > public/firebase.config.js
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            vapidKey: "${{ secrets.FIREBASE_VAPID_KEY }}"
          };
          EOF

      # 3. Vérification du fichier généré
      - name: Vérifier firebase.config.js
        run: |
          echo "=== Taille ===" && wc -c public/firebase.config.js
          echo "=== Contenu (clés uniquement) ==="
          grep -o '^[^:]*' public/firebase.config.js

      # 4. Déploiement des règles Firestore
      - name: Deploy Firestore rules
        run: |
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy \
            --only firestore:rules \
            --project rewardkidz-4fe68 \
            --non-interactive

      # 5. Déploiement sur le channel POC
      - name: Deploy to Firebase Hosting (POC channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: rewardkidz-4fe68
          channelId: poc
