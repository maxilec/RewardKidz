name: Deploy RewardKidz POC to Firebase Hosting

on:
  push:
    branches:
      - 'fix/2.0/POC'
      - 'claude/secure-dev-branch-Apa2M'
      - 'dev/main'
      - 'figma/NewUI'
      - 'claude/review-figma-ui-changes-kUMwo'
      - 'claude/setup-refactoring-branch-UypoY'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout du dépôt
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Générer .env.production avec les variables VITE_* (lues par Vite au build)
      - name: Générer .env.production depuis les secrets
        run: |
          cat <<EOF > .env.production
          VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.FIREBASE_VAPID_KEY }}
          EOF

      # 3. Vérifier que le fichier contient bien les clés (sans afficher les valeurs)
      - name: Vérifier .env.production
        run: |
          echo "=== Clés présentes ===" && grep -o '^VITE_[^=]*' .env.production
          echo "=== Lignes non vides ===" && grep -c '.' .env.production

      # 4. Installer les dépendances Node.js
      - name: Installer les dépendances
        run: npm ci

      # 5. Builder l'application SvelteKit → dossier build/
      - name: Build SvelteKit
        run: npm run build

      # 6. Déployer les règles Firestore
      - name: Deploy Firestore rules
        run: |
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json firebase deploy \
            --only firestore:rules \
            --project rewardkidz-4fe68 \
            --non-interactive

      # 7. Déployer sur le channel POC (Firebase Hosting)
      #    firebase.json pointe sur "public": "build" — le dossier buildé ci-dessus
      - name: Deploy to Firebase Hosting (POC channel)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: rewardkidz-4fe68
          channelId: poc
