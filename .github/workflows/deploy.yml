name: Deploy RewardKidz to Firebase Hosting

on:
  push:
    branches: [ '**' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer firebase.config.js depuis les secrets
        run: |
          cat <<JSEOF > firebase.config.js
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };
          JSEOF

      - name: Vérifier firebase.config.js
        run: |
          echo "=== Taille ===" && wc -c firebase.config.js
          echo "=== Clés ===" && grep -o '^[^:]*' firebase.config.js

      - name: Deploy to Firebase Hosting
        if: github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: rewardkidz-4fe68
          channelId: live

      - name: Build check (hors main)
        if: github.ref != 'refs/heads/main'
        run: |
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ firebase.config.js généré ($(wc -c < firebase.config.js) bytes)"
          echo "✅ Build OK — déploiement réservé à main"
