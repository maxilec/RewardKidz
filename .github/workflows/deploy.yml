name: Deploy RewardKidz

on:
  push:
    branches: [ '**' ]   # toutes les branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer firebase.config.js depuis les secrets
        run: |
          printf 'export const firebaseConfig = {\n' > firebase.config.js
          printf '  apiKey: "%s",\n'            "${{ secrets.FIREBASE_API_KEY }}"            >> firebase.config.js
          printf '  authDomain: "%s",\n'        "${{ secrets.FIREBASE_AUTH_DOMAIN }}"        >> firebase.config.js
          printf '  projectId: "%s",\n'         "${{ secrets.FIREBASE_PROJECT_ID }}"         >> firebase.config.js
          printf '  storageBucket: "%s",\n'     "${{ secrets.FIREBASE_STORAGE_BUCKET }}"     >> firebase.config.js
          printf '  messagingSenderId: "%s",\n' "${{ secrets.FIREBASE_SENDER_ID }}"          >> firebase.config.js
          printf '  appId: "%s",\n'             "${{ secrets.FIREBASE_APP_ID }}"             >> firebase.config.js
          printf '};\n' >> firebase.config.js

      - name: Vérifier firebase.config.js (sans afficher les valeurs)
        run: |
          echo "=== Taille du fichier ==="
          wc -c firebase.config.js
          echo "=== Lignes (valeurs masquées) ==="
          grep -o '^[^:]*' firebase.config.js

      # Déploiement sur GitHub Pages uniquement depuis main
      - name: Déployer sur GitHub Pages (main uniquement)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.md,firestore.rules,firebase.config.example.js'

      # Sur les autres branches : juste confirmer que le build passe
      - name: Build check (branches hors main)
        if: github.ref != 'refs/heads/main'
        run: |
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ firebase.config.js généré ($(wc -c < firebase.config.js) bytes)"
          echo "✅ Build OK — déploiement réservé à main"
