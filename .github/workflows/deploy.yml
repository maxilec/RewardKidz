name: Deploy RewardKidz

on:
  push:
    branches: [ '**' ]   # toutes les branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer firebase.config.js depuis les secrets
        run: |
          cat > firebase.config.js << EOF
          // ⚠️  Fichier généré automatiquement par GitHub Actions
          // Ne pas modifier manuellement
          export const firebaseConfig = {
            apiKey:            '${{ secrets.FIREBASE_API_KEY }}',
            authDomain:        '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
            projectId:         '${{ secrets.FIREBASE_PROJECT_ID }}',
            storageBucket:     '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
            messagingSenderId: '${{ secrets.FIREBASE_SENDER_ID }}',
            appId:             '${{ secrets.FIREBASE_APP_ID }}',
          };
          EOF

      # Déploiement sur GitHub Pages uniquement depuis main
      - name: Déployer sur GitHub Pages (main uniquement)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.md,firestore.rules,firebase.config.example.js'

      # Sur les autres branches : juste confirmer que le build passe
      - name: Build check (branches hors main)
        if: github.ref != 'refs/heads/main'
        run: |
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ firebase.config.js généré"
          echo "✅ Build OK — déploiement réservé à main"
