name: Deploy RewardKidz

on:
  push:
    branches: [ '**' ]   # S'exécute sur toutes les branches

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Générer firebase.config.js depuis les secrets
        run: |
          cat <<EOF > firebase.config.js
          export const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };
          EOF

      - name: Vérifier firebase.config.js (sans afficher les valeurs)
        run: |
          echo "=== Taille du fichier ==="
          wc -c firebase.config.js
          echo "=== Structure vérifiée ==="
          grep -o '^[^:]*' firebase.config.js

      - name: Préparer le déploiement (bypass gitignore)
        # On retire la restriction seulement si on va déployer
        if: github.ref == 'refs/heads/main'
        run: sed -i '/firebase.config.js/d' .gitignore

      - name: Déployer sur GitHub Pages (main uniquement)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.md,firestore.rules,firebase.config.example.js'

      - name: Build check (branches hors main)
        if: github.ref != 'refs/heads/main'
        run: |
          echo "✅ Branch: ${{ github.ref_name }}"
          echo "✅ firebase.config.js généré"
          echo "✅ Build OK — déploiement réservé à main"